<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAD OVERLORD // PARTS & ANIMATION PLAYGROUND</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,400;0,700;1,700&family=Noto+Sans+KR:wght@400;700;900&family=Orbitron:wght@500;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <style>
        body {
            background-color: #05050c;
            color: #fff;
            font-family: 'Chakra Petch', 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-y: auto;
        }
        .playground-container {
            display: flex;
            flex-direction: row;
            gap: 30px;
            width: 100%;
            max-width: 1100px;
            margin-top: 20px;
        }
        @media (max-width: 800px) {
            .playground-container {
                flex-direction: column;
            }
        }
        .viewport-section {
            flex: 1;
            background: linear-gradient(135deg, rgba(20, 20, 35, 0.8), rgba(10, 10, 20, 0.9));
            border: 2px solid #ff0055;
            box-shadow: 0 0 25px rgba(255, 0, 85, 0.4);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .viewer-stage {
            width: 330px;
            height: 248px;
            background: #111122;
            border: 2px dashed #00ffcc;
            box-shadow: inset 0 0 15px rgba(0, 255, 204, 0.3);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        .controls-section {
            flex: 1;
            background: linear-gradient(135deg, rgba(15, 15, 30, 0.8), rgba(5, 5, 15, 0.9));
            border: 2px solid #00ffcc;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.3);
            border-radius: 12px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .control-group label {
            font-weight: 700;
            font-size: 13px;
            color: #ff0055;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .control-group select {
            background: #1a1a2e;
            border: 1px solid #00ffcc;
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }
        .control-group select:focus {
            box-shadow: 0 0 8px #00ffcc;
        }
        .anim-btns {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .btn-test {
            flex: 1;
            background: transparent;
            border: 1px solid #ff0055;
            color: #ff0055;
            padding: 10px;
            border-radius: 6px;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-test.active, .btn-test:hover {
            background: #ff0055;
            color: #000;
            box-shadow: 0 0 12px #ff0055;
        }
        .stats-display {
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 6px;
            font-size: 14px;
            line-height: 1.6;
            border-left: 3px solid #ffcc00;
        }
    </style>
</head>
<body>
    <header style="text-align: center; margin-bottom: 10px;">
        <h1 style="font-family: 'Orbitron', sans-serif; font-size: 2.2rem; color: #ff0055; text-shadow: 0 0 15px #ff0055; margin: 0;">PARTS PLAYGROUND</h1>
        <p style="color: #00ffcc; font-size: 0.9rem; margin-top: 5px;">v2 Decoupled Renderer & Parts Animation Verification Tool</p>
    </header>

    <div class="playground-container">
        <!-- 좌측: 비주얼 렌더링 화면 -->
        <div class="viewport-section">
            <div style="font-family: 'Orbitron'; color: #00ffcc; margin-bottom: 10px; font-weight: 700;">SPRITE ANIMATION VIEW</div>
            <div class="viewer-stage">
                <canvas id="playground-canvas" width="330" height="248"></canvas>
            </div>

            <div style="width:100%; display:flex; flex-direction:column; gap:10px;">
                <div class="control-group">
                    <label>테스트 애니메이션 동작</label>
                    <div class="anim-btns">
                        <button id="btn-anim-idle" class="btn-test active" data-anim="idle">대기 (IDLE)</button>
                        <button id="btn-anim-walk" class="btn-test" data-anim="walk">걷기 (WALK)</button>
                        <button id="btn-anim-attack" class="btn-test" data-anim="attack">공격 (ATTACK)</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 우측: 파츠 및 디버그 컨트롤러 -->
        <div class="controls-section">
            <div style="font-family: 'Orbitron'; color: #ff0055; font-size: 1.1rem; font-weight: 800; border-bottom: 1px solid #333; padding-bottom: 10px;">PARTS MODIFICATION KIOSK</div>

            <!-- 하이브리드 엔진 모드 조절 -->
            <div class="control-group">
                <label>엔진 렌더링 모드 (Engine Render Mode)</label>
                <select id="select-engine-mode">
                    <option value="paperdoll">(v2) 레이어 관절 페이퍼돌 (Paper Doll)</option>
                    <option value="sequence">(v1) 베이킹 프레임 시퀀스 (Baked Sequence)</option>
                </select>
            </div>

            <div class="control-group">
                <label>다리 애니메이션 물리 방식 (Leg Anim Type)</label>
                <select id="select-leg-anim-type">
                    <option value="pivot">관절 스윙 회전 (Pivot swing)</option>
                    <option value="sprite">스프라이트 무한궤도 흐름 (Sprite sheet/treads)</option>
                </select>
            </div>

            <!-- 기존 슬롯 파츠 스왑 -->
            <div class="control-group">
                <label>머리 파츠 (Head)</label>
                <select id="select-head"></select>
            </div>

            <div class="control-group">
                <label>가슴/몸통 파츠 (Body)</label>
                <select id="select-body"></select>
            </div>

            <div class="control-group">
                <label>팔/무기 파츠 (Arm)</label>
                <select id="select-arm"></select>
            </div>

            <div class="control-group">
                <label>다리 파츠 (Leg)</label>
                <select id="select-leg"></select>
            </div>

            <div class="control-group" style="margin-top: 10px;">
                <label>조합된 파츠 스탯 데이터 피드백</label>
                <div class="stats-display" id="stats-feedback">
                    HP: -<br>
                    DPS: -<br>
                    사거리: -<br>
                    속도: -
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/ui/playground.js"></script>
</body>
</html>
